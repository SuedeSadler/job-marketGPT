<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>job-marketGPT — Auckland</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --panel: #ffffff;
    --border: #e8e5df;
    --border-strong: #d0ccc4;
    --text-primary: #1a1816;
    --text-secondary: #6b6560;
    --text-muted: #a8a49e;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-text: #1d4ed8;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Courier New', monospace;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text-primary); font-family: var(--sans); }

  .app { display: flex; height: 100vh; }

  /* LEFT PANEL */
  .left {
    width: 400px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }

  .wordmark { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
  .wordmark span { color: var(--accent); }

  .live-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--green); font-weight: 500;
    background: var(--green-bg); padding: 3px 8px; border-radius: 20px;
  }

  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .header-sub { font-size: 12px; color: var(--text-muted); }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .stat { padding: 14px 16px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 20px; font-weight: 600; color: var(--text-primary); line-height: 1; margin-bottom: 3px; letter-spacing: -0.02em; }
  .stat-label { font-size: 11px; color: var(--text-muted); }

  /* Category filter — single scrollable row */
  .filter-section { padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .filter-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .filter-chips {
    display: flex; gap: 6px;
    overflow-x: auto; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }

  .chip {
    font-size: 12px; padding: 5px 12px;
    border: 1px solid var(--border-strong); border-radius: 20px;
    color: var(--text-secondary); cursor: pointer;
    background: transparent; font-family: var(--sans);
    transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text); font-weight: 500; }

  /* Query */
  .query-section { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }

  .query-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1.5px solid var(--border-strong);
    border-radius: 10px; padding: 8px 12px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }

  .query-box:focus-within { border-color: var(--accent); }
  .query-icon { color: var(--text-muted); font-size: 15px; flex-shrink: 0; }

  .query-input {
    flex: 1; background: transparent; border: none;
    color: var(--text-primary); font-family: var(--sans);
    font-size: 13px; outline: none;
  }

  .query-input::placeholder { color: var(--text-muted); }

  .query-btn {
    background: var(--accent); border: none; color: #fff;
    font-family: var(--sans); font-size: 12px; font-weight: 600;
    padding: 6px 14px; border-radius: 7px; cursor: pointer;
    flex-shrink: 0; transition: opacity 0.15s;
  }

  .query-btn:hover { opacity: 0.88; }
  .query-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .suggestions { display: flex; gap: 6px; flex-wrap: wrap; }

  .sug {
    font-size: 11px; border: 1px solid var(--border);
    color: var(--text-secondary); padding: 4px 10px;
    border-radius: 20px; cursor: pointer; transition: all 0.15s;
    background: var(--panel);
  }

  .sug:hover { border-color: var(--accent); color: var(--accent); }

  .scroll-area { flex: 1; overflow-y: auto; }

  .answer-box {
    margin: 12px 16px; padding: 14px 16px;
    background: var(--accent-bg); border: 1px solid #bfdbfe;
    border-radius: 10px; display: none;
  }

  .answer-box.visible { display: block; }
  .answer-label { font-size: 11px; font-weight: 600; color: var(--accent-text); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .answer-text { font-size: 13px; color: #1e3a6e; line-height: 1.7; white-space: normal; }
  .answer-cite { margin-top: 10px; font-size: 11px; color: #6b9be8; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .blink { animation: blink 1s infinite; }

  .listings-head {
    padding: 12px 16px 6px; font-size: 11px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
    display: flex; align-items: center; justify-content: space-between;
  }

  .clear-filter { font-size: 11px; color: var(--accent); cursor: pointer; font-weight: 500; display: none; }
  .clear-filter.visible { display: block; }

  .listing-card {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s;
  }

  .listing-card:hover { background: var(--bg); }
  .listing-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 3px; line-height: 1.35; }
  .listing-company { font-size: 12px; color: var(--text-secondary); margin-bottom: 7px; }

  .listing-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .tag-location { background: #f1f5f9; color: #475569; }
  .tag-salary { background: var(--green-bg); color: #166534; }
  .tag-cat { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

  /* RIGHT */
  .right { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* Mapbox popup override */
  .mapboxgl-popup-content {
    border-radius: 10px !important;
    padding: 14px 16px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
    font-family: var(--sans) !important;
    min-width: 200px;
  }

  .mapboxgl-popup-tip { display: none !important; }

  .popup-suburb { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
  .popup-count { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
  .popup-cats { display: flex; flex-direction: column; gap: 5px; }
  .popup-cat-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .popup-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .popup-cat-name { flex: 1; color: var(--text-secondary); }
  .popup-cat-bar-bg { width: 60px; height: 3px; background: #e5e7eb; border-radius: 2px; flex-shrink: 0; }
  .popup-cat-bar { height: 3px; border-radius: 2px; }
  .popup-cat-val { color: var(--text-muted); font-weight: 500; min-width: 20px; text-align: right; }
  .popup-action {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--accent); cursor: pointer; font-weight: 500;
    text-align: center;
  }

  /* Legend */
  .map-legend {
    position: absolute; bottom: 32px; right: 16px; z-index: 10;
    background: white; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .legend-title { font-size: 11px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .legend-cats { display: flex; flex-direction: column; gap: 5px; }
  .legend-row { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text-secondary); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 768px) {
    html, body { height: 100%; overflow: hidden; }

    /* Hide desktop layout */
    .app { display: block; height: 100vh; position: relative; }
    .left { display: none; }
    .right { width: 100%; height: 100%; }
    .map-legend { display: none; }

    /* Floating search bar at top */
    .mobile-search {
      display: flex !important;
      position: absolute;
      top: 12px; left: 12px; right: 12px;
      z-index: 100;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.15);
      padding: 10px 14px;
      align-items: center;
      gap: 8px;
    }

    .mobile-search input {
      flex: 1; border: none; outline: none;
      font-size: 14px; color: var(--text-primary);
      font-family: var(--sans);
      background: transparent;
    }

    .mobile-search input::placeholder { color: var(--text-muted); }

    .mobile-search-btn {
      background: var(--accent); color: white;
      border: none; border-radius: 8px;
      padding: 6px 12px; font-size: 12px;
      font-weight: 600; cursor: pointer;
      font-family: var(--sans);
    }

    /* Bottom sheet */
    .mobile-sheet {
      display: flex !important;
      flex-direction: column;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: white;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
      transition: height 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      height: 100px;
      overflow: hidden;
    }

    .mobile-sheet.peek { height: 100px; }
    .mobile-sheet.half { height: 55vh; }
    .mobile-sheet.full { height: 90vh; }

    /* Drag handle */
    .sheet-handle {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 16px 8px;
      cursor: pointer;
      user-select: none;
    }

    .sheet-handle-bar {
      width: 36px; height: 4px;
      background: #d1d5db; border-radius: 2px;
      margin-bottom: 10px;
    }

    .sheet-peek-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .sheet-peek-title {
      font-size: 14px; font-weight: 600;
      color: var(--text-primary);
    }

    .sheet-peek-sub {
      font-size: 12px; color: var(--text-muted);
    }

    .sheet-peek-expand {
      font-size: 11px; color: var(--accent);
      font-weight: 500;
    }

    /* Sheet content — hidden until half/full */
    .sheet-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .mobile-sheet.half .sheet-content,
    .mobile-sheet.full .sheet-content {
      opacity: 1;
    }

    /* Category chips inside sheet */
    .sheet-cats {
      padding: 0 16px 10px;
      display: flex; gap: 6px;
      overflow-x: auto; flex-shrink: 0;
      scrollbar-width: none;
    }
    .sheet-cats::-webkit-scrollbar { display: none; }

    .sheet-chip {
      font-size: 12px; padding: 5px 12px;
      border: 1px solid var(--border-strong); border-radius: 20px;
      color: var(--text-secondary); cursor: pointer;
      background: transparent; font-family: var(--sans);
      white-space: nowrap; flex-shrink: 0;
      transition: all 0.15s;
    }

    .sheet-chip.active {
      background: var(--accent-bg); border-color: var(--accent);
      color: var(--accent-text); font-weight: 500;
    }

    /* Answer box in sheet */
    .sheet-answer {
      margin: 0 16px 12px;
      padding: 12px 14px;
      background: var(--accent-bg); border: 1px solid #bfdbfe;
      border-radius: 10px; display: none; flex-shrink: 0;
    }

    .sheet-answer.visible { display: block; }
    .sheet-answer-label { font-size: 10px; font-weight: 600; color: var(--accent-text); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .sheet-answer-text { font-size: 13px; color: #1e3a6e; line-height: 1.65; white-space: normal; }
    .sheet-answer-cite { margin-top: 8px; font-size: 10px; color: #6b9be8; }

    /* Job cards in sheet */
    .sheet-listings-head {
      padding: 4px 16px 6px;
      font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.06em; flex-shrink: 0;
    }

    /* Mini job card — tapped from map dot */
    .mini-card {
      display: none;
      position: absolute;
      bottom: 110px; left: 12px; right: 12px;
      z-index: 99;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 14px 16px;
    }

    .mini-card.visible { display: block; }
    .mini-card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; line-height: 1.3; }
    .mini-card-company { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .mini-card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .mini-card-actions { display: flex; gap: 8px; }
    .mini-card-btn {
      flex: 1; padding: 9px; border-radius: 8px;
      font-size: 13px; font-weight: 500; text-align: center;
      cursor: pointer; border: none; font-family: var(--sans);
    }
    .mini-card-btn.primary { background: var(--accent); color: white; }
    .mini-card-btn.secondary { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .mini-card-close {
      position: absolute; top: 10px; right: 12px;
      font-size: 18px; color: var(--text-muted); cursor: pointer;
      line-height: 1;
    }

    /* Quick suburb filters */
    .suburb-pills {
      position: absolute;
      top: 70px; left: 12px; right: 12px;
      z-index: 99;
      display: flex !important;
      gap: 6px; overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .suburb-pills::-webkit-scrollbar { display: none; }
    .suburb-pill {
      font-size: 12px; font-weight: 500;
      padding: 6px 12px;
      background: white; border: none;
      border-radius: 20px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.12);
      color: var(--text-secondary);
      cursor: pointer; white-space: nowrap;
      font-family: var(--sans);
      transition: all 0.15s; flex-shrink: 0;
    }
    .suburb-pill.active { background: var(--accent); color: white; }
  }
</style>
</head>

function getSuburb(location) {
  if (!location) return 'Auckland';
  return location.split(',')[0].trim();
}

function getCatColor(cat) {
  return CAT_COLORS[cat] || DEFAULT_COLOR;
}

async function dbAll(table, select) {
  const pageSize = 1000;
  let all = [], offset = 0;
  while (true) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${select}&limit=${pageSize}&offset=${offset}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const page = await res.json();
    if (!page?.length) break;
    all = all.concat(page);
    if (page.length < pageSize) break;
    offset += pageSize;
  }
  return all;
}

async function initMap() {
  const tokenRes = await fetch('/api/map-token');
  const { token } = await tokenRes.json();
  mapboxgl.accessToken = token;

  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [174.76, -36.86],
    zoom: 10.5,
    attributionControl: true,
  });

  map.addControl(new mapboxgl.NavigationControl(), 'top-right');
  popup = new mapboxgl.Popup({ closeButton: false, maxWidth: '260px' });

  return new Promise(resolve => map.on('load', resolve));
}

function buildGeoJSON(listings) {
  const features = [];
  listings.forEach(j => {
    const suburb = getSuburb(j.location);
    const coords = SUBURB_COORDS[suburb];
    if (!coords) return;
    // Small jitter so dots don't stack exactly
    const jitter = () => (Math.random() - 0.5) * 0.008;
    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [coords[0] + jitter(), coords[1] + jitter()] },
      properties: {
        title: j.title,
        company: j.company,
        location: j.location,
        suburb: suburb,
        salary: j.salary,
        category: j.category || 'Other',
        color: getCatColor(j.category),
        seek_url: j.seek_url,
      }
    });
  });
  return { type: 'FeatureCollection', features };
}

function buildSuburbGeoJSON(listings) {
  const suburbData = {};
  listings.forEach(j => {
    const suburb = getSuburb(j.location);
    const coords = SUBURB_COORDS[suburb];
    if (!coords) return;
    if (!suburbData[suburb]) suburbData[suburb] = { coords, count: 0, cats: {} };
    suburbData[suburb].count++;
    const cat = j.category || 'Other';
    suburbData[suburb].cats[cat] = (suburbData[suburb].cats[cat] || 0) + 1;
  });

  return {
    type: 'FeatureCollection',
    features: Object.entries(suburbData).map(([suburb, data]) => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: data.coords },
      properties: { suburb, count: data.count, cats: JSON.stringify(data.cats) }
    }))
  };
}

function addMapLayers(listings) {
  const dotGeoJSON = buildGeoJSON(listings);
  const suburbGeoJSON = buildSuburbGeoJSON(listings);

  // Remove existing layers/sources
  ['dots', 'clusters', 'cluster-count', 'suburb-circles', 'suburb-labels', 'heatmap'].forEach(id => {
    if (map.getLayer(id)) map.removeLayer(id);
  });
  ['dot-source', 'suburb-source'].forEach(id => {
    if (map.getSource(id)) map.removeSource(id);
  });

  // Individual dots source with clustering
  map.addSource('dot-source', {
    type: 'geojson',
    data: dotGeoJSON,
    cluster: true,
    clusterMaxZoom: 12,
    clusterRadius: 40,
  });

  // Suburb summary source
  map.addSource('suburb-source', {
    type: 'geojson',
    data: suburbGeoJSON,
  });

  // Heatmap — visible at low zoom
  map.addLayer({
    id: 'heatmap',
    type: 'heatmap',
    source: 'dot-source',
    maxzoom: 11,
    paint: {
      'heatmap-weight': 1,
      'heatmap-intensity': ['interpolate', ['linear'], ['zoom'], 9, 0.6, 11, 1.2],
      'heatmap-color': [
        'interpolate', ['linear'], ['heatmap-density'],
        0, 'rgba(37,99,235,0)',
        0.2, 'rgba(37,99,235,0.15)',
        0.5, 'rgba(37,99,235,0.4)',
        0.8, 'rgba(37,99,235,0.65)',
        1, 'rgba(29,78,216,0.85)'
      ],
      'heatmap-radius': ['interpolate', ['linear'], ['zoom'], 9, 20, 11, 35],
      'heatmap-opacity': ['interpolate', ['linear'], ['zoom'], 10, 0.8, 11, 0],
    }
  });

  // Cluster circles
  map.addLayer({
    id: 'clusters',
    type: 'circle',
    source: 'dot-source',
    filter: ['has', 'point_count'],
    paint: {
      'circle-color': '#2563eb',
      'circle-radius': ['step', ['get', 'point_count'], 18, 10, 24, 50, 32, 100, 40],
      'circle-opacity': 0.85,
      'circle-stroke-width': 3,
      'circle-stroke-color': 'rgba(37,99,235,0.2)',
    }
  });

  // Cluster count labels
  map.addLayer({
    id: 'cluster-count',
    type: 'symbol',
    source: 'dot-source',
    filter: ['has', 'point_count'],
    layout: {
      'text-field': '{point_count_abbreviated}',
      'text-font': ['DIN Offc Pro Medium', 'Arial Unicode MS Bold'],
      'text-size': 13,
    },
    paint: { 'text-color': '#ffffff' }
  });

  // Individual dots — coloured by category, visible when zoomed in
  map.addLayer({
    id: 'dots',
    type: 'circle',
    source: 'dot-source',
    filter: ['!', ['has', 'point_count']],
    paint: {
      'circle-color': ['get', 'color'],
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 4, 14, 7],
      'circle-opacity': 0.85,
      'circle-stroke-width': 1.5,
      'circle-stroke-color': '#ffffff',
    }
  });

  // Click cluster → zoom in
  map.on('click', 'clusters', e => {
    const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
    const clusterId = features[0].properties.cluster_id;
    map.getSource('dot-source').getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({ center: features[0].geometry.coordinates, zoom });
    });
  });

  // Click individual dot → popup (desktop) or mini card (mobile)
  map.on('click', 'dots', e => {
    if (isMobile()) return; // handled by initMobileSheet
    const props = e.features[0].properties;
    const coords = e.features[0].geometry.coordinates.slice();

    new mapboxgl.Popup({ closeButton: true, maxWidth: '260px' })
      .setLngLat(coords)
      .setHTML(`
        <div style="font-family:-apple-system,sans-serif">
          <div style="font-size:13px;font-weight:600;color:#1a1816;margin-bottom:3px;line-height:1.3">${props.title || '—'}</div>
          ${props.company ? `<div style="font-size:12px;color:#6b6560;margin-bottom:6px">${props.company}</div>` : ''}
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            ${props.location ? `<span style="font-size:11px;background:#f1f5f9;color:#475569;padding:2px 7px;border-radius:4px">${props.suburb}</span>` : ''}
            ${props.salary ? `<span style="font-size:11px;background:#f0fdf4;color:#166534;padding:2px 7px;border-radius:4px">${props.salary}</span>` : ''}
          </div>
          <div style="margin-top:8px;display:flex;align-items:center;gap:6px">
            <div style="width:8px;height:8px;border-radius:50%;background:${props.color};flex-shrink:0"></div>
            <span style="font-size:11px;color:#6b6560">${props.category}</span>
          </div>
          ${props.seek_url && props.seek_url !== 'null' ? `<a href="${props.seek_url}" target="_blank" style="display:block;margin-top:10px;padding-top:8px;border-top:1px solid #e8e5df;font-size:11px;color:#2563eb;text-decoration:none;font-weight:500">View listing →</a>` : ''}
        </div>
      `)
      .addTo(map);

    // Also filter left panel to this suburb
    const suburbJobs = filteredListings.filter(j => getSuburb(j.location) === props.suburb);
    showListings(suburbJobs, props.suburb);
    document.getElementById('clear-filter').classList.add('visible');
  });

  // Cursor changes
  ['clusters', 'dots'].forEach(layer => {
    map.on('mouseenter', layer, () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', layer, () => map.getCanvas().style.cursor = '');
  });
}

    .sort((a, b) => b.count - a.count)

  document.getElementById('map-legend').innerHTML = `
    <div class="legend-title">Category</div>

        <div class="legend-row">

function setQ(el) { document.getElementById('query-input').value = el.textContent; }

async function runQuery() {
  const query = document.getElementById('query-input').value.trim();
  if (!query) return;
  const btn = document.getElementById('query-btn');
  const box = document.getElementById('answer-box');
  const text = document.getElementById('answer-text');
  btn.disabled = true; btn.textContent = '...';
  box.classList.add('visible');
  text.innerHTML = '<span class="blink">█</span>';
  document.getElementById('answer-cite').textContent = '';

  try {
    const embedRes = await fetch('/api/embed', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: query }),
    });
    const { embedding } = await embedRes.json();

    const searchRes = await fetch(`${SUPABASE_URL}/rest/v1/rpc/match_jobs`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query_embedding: embedding, match_count: 25 }),
    });
    const results = await searchRes.json();
    if (!results?.length) { text.textContent = 'No relevant listings found.'; return; }

    const context = results.map((r, i) =>
      `[Listing ${i+1}]\nTitle: ${r.title}\nCompany: ${r.company||'Not specified'}\nLocation: ${r.location||'Not specified'}\nCategory: ${r.category||'Not specified'}\nSalary: ${r.salary||'Not disclosed'}\nDescription: ${r.description_snippet||'No description available'}\nLink: ${r.seek_url||''}`
    ).join('\n\n---\n\n');

    // Show listings immediately while answer streams
    showListings(results, 'Relevant listings');
    document.getElementById('clear-filter').classList.add('visible');

    if (results[0]?.location) {
      const suburb = getSuburb(results[0].location);
      const coords = SUBURB_COORDS[suburb];
      if (coords) map.flyTo({ center: coords, zoom: 12, duration: 1200 });
    }

    // Stream the answer
    text.textContent = '';
    const claudeRes = await fetch('/api/query', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, context }),
    });

    const reader = claudeRes.body.getReader();
    const decoder = new TextDecoder('utf-8', { fatal: false });
    let fullAnswer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      fullAnswer += chunk;
      text.innerHTML = formatAnswer(fullAnswer);
    }
    document.getElementById('answer-cite').textContent = `Based on ${results.length} listings · ${new Date().toLocaleDateString('en-NZ')}`;
  } catch(err) {
    text.textContent = `Error: ${err.message}`;
  } finally {
    btn.disabled = false; btn.textContent = 'Ask';
  }
}

document.getElementById('query-input').addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(); });

function formatAnswer(raw) {
  const lines = raw.split("\n");
  let html = "";
  for (const line of lines) {
    const t = line.trim();
    if (!t) { html += "<br>"; continue; }
    // Bold job title lines: **Title** at Company
    const boldLine = t.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    // Arrow lines (job examples)
    if (t.startsWith("\u2192") || t.startsWith("->") || t.startsWith("\u00bb")) {
      html += '<div style="font-size:12px;color:#6b6560;margin:2px 0 6px 0;padding-left:10px;border-left:2px solid #bfdbfe">' + boldLine.replace(/^[\u2192\->&]+\s*/, "") + "</div>";
    } else if (/^[\u2022\-\*]\s/.test(t)) {
      html += '<div style="display:flex;gap:6px;margin:4px 0"><span style="color:#2563eb;flex-shrink:0">&#8226;</span><span>' + boldLine.slice(2) + "</span></div>";
    } else if (/^\d+\.\s/.test(t)) {
      html += '<div style="display:flex;gap:6px;margin:4px 0"><span style="color:#2563eb;flex-shrink:0;font-weight:600">' + t.match(/^\d+/)[0] + ".</span><span>" + boldLine.replace(/^\d+\.\s/, "") + "</span></div>";
    } else if (t.startsWith("Takeaway:")) {
      html += '<div style="margin-top:10px;padding:8px 12px;background:#f0fdf4;border-radius:6px;font-size:12px;color:#166534;font-weight:500">' + boldLine + "</div>";
    } else {
      html += "<div>" + boldLine + "</div>";
    }
  }
  return html;
}

async function init() {
  await initMap();

  allListings = await dbAll('job_listings', 'title,company,location,salary,category,seek_url');
  filteredListings = allListings;

  const withSalary = allListings.filter(j => j.salary).length;
  const suburbs = new Set(allListings.map(j => getSuburb(j.location)).filter(s => SUBURB_COORDS[s]));

  document.getElementById('stat-total').textContent = allListings.length.toLocaleString();
  document.getElementById('stat-salary').textContent = Math.round(withSalary / allListings.length * 100) + '%';
  document.getElementById('stat-suburbs').textContent = suburbs.size;

  // Category chips — single scrollable row
  const cats = [...new Set(allListings.map(j => j.category).filter(Boolean))].sort();
  const chips = document.getElementById('filter-chips');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = () => filterCat(btn);
    chips.appendChild(btn);
  });

  addMapLayers(allListings);
  buildLegend(allListings);
  showListings(allListings);
  initMobileSheet();
}

init();

const isMobile = () => window.innerWidth <= 768;
const sheetStates = ['peek', 'half', 'full'];
let sheetState = 'peek';
let mobileActiveSuburb = 'all';
let mobileActiveCategory = 'all';
let touchStartY = 0, touchStartState = 'peek';

function cycleSheet() {
  if (!isMobile()) return;
  const sheet = document.getElementById('mobile-sheet');
  const idx = sheetStates.indexOf(sheetState);
  sheetState = sheetStates[(idx + 1) % sheetStates.length];
  sheet.className = 'mobile-sheet ' + sheetState;
  updateSheetExpand();
}

function openSheet(state) {
  if (!isMobile()) return;
  sheetState = state;
  const sheet = document.getElementById('mobile-sheet');
  sheet.className = 'mobile-sheet ' + state;
  updateSheetExpand();
}

function updateSheetExpand() {
  const el = document.getElementById('sheet-expand');
  if (sheetState === 'peek') el.textContent = 'Tap to explore ↑';
  else if (sheetState === 'half') el.textContent = 'More ↑';
  else el.textContent = 'Collapse ↓';
}

// Touch drag to resize sheet
const sheet = document.getElementById('mobile-sheet');
const handle = sheet?.querySelector('.sheet-handle');
if (handle) {
  handle.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
    touchStartState = sheetState;
  }, { passive: true });

  handle.addEventListener('touchend', e => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (dy > 40) {
      // Swipe up
      if (touchStartState === 'peek') openSheet('half');
      else if (touchStartState === 'half') openSheet('full');
    } else if (dy < -40) {
      // Swipe down
      if (touchStartState === 'full') openSheet('half');
      else if (touchStartState === 'half') openSheet('peek');
    } else {
      cycleSheet();
    }
  }, { passive: true });
}

function mobileShowListings(listings, label) {
  if (!isMobile()) return;
  document.getElementById('sheet-listings-label').textContent =

function mobileFilterSuburb(el) {

    ${props.location ? `<span class="tag tag-location">${props.suburb || getSuburb(props.location)}</span>` : ''}
    ${props.salary && props.salary !== 'null' ? `<span class="tag tag-salary">${props.salary}</span>` : ''}
    ${props.category ? `<span class="tag tag-cat" style="border-left:3px solid ${getCatColor(props.category)}">${props.category}</span>` : ''}
  `;
  const btn = document.getElementById('mini-view');
  if (props.seek_url && props.seek_url !== 'null') {
    btn.style.display = 'block';
    btn.onclick = () => window.open(props.seek_url, '_blank');
  } else {
    btn.style.display = 'none';
  }
  card.classList.add('visible');

  // Snap sheet to peek when mini card shows
  openSheet('peek');
}

// Override dot click on mobile to show mini card
function mobileMapDotClick(e) {
  if (!isMobile()) return;
  const props = e.features[0].properties;
  showMiniCard(props);
  const suburbJobs = filteredListings.filter(j => getSuburb(j.location) === props.suburb);
  document.getElementById('sheet-sub').textContent = props.suburb + ' · ' + suburbJobs.length + ' listings';
}

async function mobileRunQuery() {
  if (!isMobile()) return;
  const query = document.getElementById('mobile-query-input').value.trim();
  if (!query) return;

  const btn = document.querySelector('.mobile-search-btn');
  btn.textContent = '...'; btn.disabled = true;

  const answerBox = document.getElementById('sheet-answer');
  const answerText = document.getElementById('sheet-answer-text');
  answerBox.classList.add('visible');
  answerText.innerHTML = '<span class="blink">█</span>';
  document.getElementById('sheet-answer-cite').textContent = '';
  openSheet('half');

  try {
    const embedRes = await fetch('/api/embed', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: query }),
    });
    const { embedding } = await embedRes.json();

    const searchRes = await fetch(SUPABASE_URL + '/rest/v1/rpc/match_jobs', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query_embedding: embedding, match_count: 25 }),
    });
    const results = await searchRes.json();
    if (!results?.length) { answerText.textContent = 'No relevant listings found.'; return; }

    const context = results.map(r =>
      'Title: ' + r.title + '\nCompany: ' + (r.company||'Unknown') + '\nLocation: ' + (r.location||'Unknown') + '\nCategory: ' + r.category + '\nSalary: ' + (r.salary||'Not specified') + '\nDescription: ' + (r.description_snippet||'')
    ).join('\n\n---\n\n');

    // Show listings immediately
    mobileShowListings(results, 'Relevant listings');
    openSheet('full');

    if (results[0]?.location) {
      const suburb = getSuburb(results[0].location);
      const coords = SUBURB_COORDS[suburb];
      if (coords) map.flyTo({ center: coords, zoom: 12, duration: 1000 });
    }

    // Stream the answer
    answerText.textContent = '';
    const claudeRes = await fetch('/api/query', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, context }),
    });

    const mobileReader = claudeRes.body.getReader();
    const mobileDecoder = new TextDecoder('utf-8', { fatal: false });
    let mobileAnswer = '';
    while (true) {
      const { done, value } = await mobileReader.read();
      if (done) break;
      mobileAnswer += mobileDecoder.decode(value);
      answerText.innerHTML = formatAnswer(mobileAnswer);
    }
    document.getElementById('sheet-answer-cite').textContent = 'Based on ' + results.length + ' listings · ' + new Date().toLocaleDateString('en-NZ');
  } catch(err) {
    answerText.textContent = 'Error: ' + err.message;
  } finally {
    btn.textContent = 'Ask'; btn.disabled = false;
  }
}

document.getElementById('mobile-query-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') mobileRunQuery();
});

// Populate mobile sheet chips after data loads
function initMobileSheet() {
  if (!isMobile()) return;

  document.getElementById('sheet-sub').textContent = allListings.length.toLocaleString() + ' listings';
  document.getElementById('sheet-title').textContent = 'Auckland jobs';

  const cats = [...new Set(allListings.map(j => j.category).filter(Boolean))].sort();
  const sheetCats = document.getElementById('sheet-cats');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'sheet-chip';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.onclick = () => mobileFilterCat(btn);
    sheetCats.appendChild(btn);
  });

  mobileShowListings(allListings);

  // Override the dot click handler for mobile
  map.on('click', 'dots', e => {
    if (isMobile()) {
      mobileMapDotClick(e);
    }
  });
}

// Call after init
const origInit = init;
window.addEventListener('load', () => {
  // initMobileSheet is called at end of init after data loads
});

</script>
